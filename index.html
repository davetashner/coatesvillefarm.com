<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coatesville Farm</title>

  <!-- Security headers (meta tag fallback; prefer CloudFront response headers policy) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' https://www.google.com https://www.gstatic.com;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data:;
                 connect-src 'self' https://www.google.com https://*.execute-api.us-east-1.amazonaws.com;
                 frame-src https://www.google.com;
                 object-src 'none';
                 base-uri 'self';
                 form-action 'self'" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Preconnect to font origins for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lora&display=swap" rel="stylesheet" />

  <!-- Preload hero image -->
  <link rel="preload" as="image" href="/assets/img/hero.png" />

  <!-- OpenGraph meta tags -->
  <meta property="og:title" content="Coatesville Farm | Fresh Produce in Beaverdam, VA" />
  <meta property="og:description" content="Coatesville Farm is a family-run farm in Beaverdam, Virginia growing fresh produce with sustainable practices across generations." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://coatesvillefarm.com" />
  <meta property="og:image" content="https://coatesvillefarm.com/assets/img/hero.png" />
  <meta property="og:site_name" content="Coatesville Farm" />

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/logo.png" />

  <!-- Structured data: LocalBusiness (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Farm",
    "name": "Coatesville Farm",
    "description": "Coatesville Farm is a family-run farm in Beaverdam, Virginia growing fresh produce with sustainable practices across generations.",
    "url": "https://coatesvillefarm.com",
    "telephone": "(804) 449-6016",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "14072 Old Ridge Road",
      "addressLocality": "Beaverdam",
      "addressRegion": "VA",
      "addressCountry": "US"
    },
    "image": "https://coatesvillefarm.com/assets/img/hero.png"
  }
  </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
